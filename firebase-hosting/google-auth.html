<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход через Google — ProjectMan</title>
    <link rel="stylesheet" href="/google-auth.css?v=1">
    <script src="https://accounts.google.com/gsi/client?hl=ru" defer></script>
    <script src="/google-auth.js?v=1" defer></script>
</head>
<body>
    <main class="auth-card" aria-live="polite">
        <div class="brand-mark" aria-hidden="true">P</div>
        <h1>Вход в ProjectMan</h1>

        <div id="google-auth-button" class="google-auth-button"></div>
        <p class="hint">После подтверждения это окно закроется автоматически.</p>
    </main>
</body>
</html>
